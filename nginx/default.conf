map $http_cf_ipcountry $preferred_lang_path {
  default /en/;
  "" "";
  CN /zh/;
  HK /zh/;
  MO /zh/;
  TW /zh/;
}

server {
  listen 80;
  server_name _;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    if ($preferred_lang_path != "") {
      return 302 $preferred_lang_path;
    }
    try_files /index.html =404;
  }

  location = /api/health {
    proxy_pass http://127.0.0.1:4321/health;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /api/refresh {
    proxy_pass http://127.0.0.1:4321/refresh;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
  }

  location / {
    try_files $uri $uri/ =404;
  }

  location ^~ /assets/ {
    expires 1h;
    add_header Cache-Control "public";
  }

  location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
